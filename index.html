<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة البيانات الآمنة ومولد QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary-color: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin: 20px 0; 
        }

        h2 {
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        input[type="color"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        button.btn-save {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }

        button.btn-save:hover {
            background-color: #27ae60;
        }

        #qr-result-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
            display: none;
        }

        #qrcode-canvas {
            display: inline-block;
            margin: 20px auto;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-download {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .ad-container {
            width: 100%;
            max-width: 500px;
            margin: 15px auto 30px auto;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 محفظة البيانات الشخصية الـ آمنة</h2>
    
    <form id="vaultForm" onsubmit="generateSecureQR(event)" autocomplete="off">
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="example@mail.com" autocomplete="off" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" id="phone" placeholder="07xxxxxxxx" autocomplete="off" required>
        </div>

        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="dob" required>
        </div>

        <legend style="text-align: right; font-weight: bold; margin-top: 15px; font-size: 14px; color: #777;">🎨 تخصيص مظهر الباركود:</legend>
        <div class="row">
            <div class="form-group">
                <label>لون الكود:</label>
                <input type="color" id="qrColor" value="#000000">
            </div>
            <div class="form-group">
                <label>لون الخلفية:</label>
                <input type="color" id="bgColor" value="#ffffff">
            </div>
        </div>

        <button type="submit" class="btn-save">💾 Save (حفظ وتوليد الكود)</button>
    </form>

    <div id="qr-result-section">
        <h3>🎉 تم حفظ ملفك بنجاح!</h3>
        <p style="font-size: 13px; color: #666;">امسح الكود أدناه من أي هاتف آخر لمراجعة معلوماتك فوراً.</p>
        
        <div>
            <canvas id="qrcode-canvas"></canvas>
        </div>
        
        <br>
        <button class="btn-download" onclick="downloadQR()">📥 تحميل صورة الباركود</button>
    </div>
</div>

<div class="ad-container">
    <script async="async" data-cfasync="false" src="https://pl30224991.effectivecpmnetwork.com/667eab27d23db57e45f6df509573c18b/invoke.js"></script>
    <div id="container-667eab27d23db57e45f6df509573c18b"></div>
</div>

<script>
    function generateSecureQR(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const dob = document.getElementById('dob').value;
        
        const qrColor = document.getElementById('qrColor').value;
        const bgColor = document.getElementById('bgColor').value;

        const secureData = `--- ملف البيانات الشخصية ---
📧 الإيميل: ${email}
🔑 الباسورد: ${password}
📞 الهاتف: ${phone}
📅 الميلاد: ${dob}
----------------------------`;

        // توليد الباركود باستخدام المكتبة الجديدة والمستقرة
        const qr = new QRious({
            element: document.getElementById('qrcode-canvas'),
            value: secureData,
            size: 200,
            foreground: qrColor,
            background: bgColor,
            level: 'H'
        });

        document.getElementById("qr-result-section").style.display = "block";
        document.getElementById("qr-result-section").scrollIntoView({ behavior: 'smooth' });
    }

    function downloadQR() {
        const canvas = document.getElementById('qrcode-canvas');
        if (canvas) {
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = image;
            link.download = 'Secure_Personal_QR.png';
            link.click();
        } else {
            alert("يرجى توليد الكود أولاً قبل التحميل.");
        }
    }
</script>

</body>
</html>
