<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة النسخ الاحتياطي الآمن للبيانات - QR Code Vault</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2b579a;
            --primary-hover: #1e3d70;
            --border-color: #cccccc;
            --success-color: #2ea44f;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        p.desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .form-group {
            text-align: right;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-generate {
            background-color: var(--primary-color);
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .btn-save {
            background-color: var(--success-color);
        }

        .btn-save:hover {
            background-color: #22863a;
        }

        #qrcode-container {
            margin-top: 30px;
            display: none;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        #qrcode {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: inline-block;
        }

        .alert-success {
            margin-top: 15px;
            font-size: 13px;
            color: var(--success-color);
            font-weight: bold;
        }

        /* مساحة مخصصة للإعلانات النظيفة */
        .ad-space {
            margin: 20px 0;
            padding: 10px;
            background: #ebebeb;
            border-radius: 6px;
            font-size: 12px;
            color: #777;
            width: 100%;
            max-width: 500px;
        }
    </style>
    <!-- مكتبة الـ QR الأساسية الموثوقة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- مساحة إعلانات Adsterra العلوية -->
<div class="ad-space">
    <!-- يمكنك وضع كود الإعلان الخاص بـ Adsterra هنا مباشرة -->
    <p>إعلان مدعوم</p>
</div>

<div class="container">
    <h1>مفكرة حفظ معلومات الحسابات والنسخ الاحتياطي الآمن</h1>[span_1](start_span)[span_1](end_span)
    <p class="desc">أدخل بياناتك لحفظها وتوليد كود QR سليم يقرأه أي هاتف آخر باللغة العربية دون خربطة.</p>

    <div class="form-group">
        <label for="email">البريد الإلكتروني أو الحساب:</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>
    </div>

    <div class="form-group">
        <label for="password">كلمة المرور (Password):</label>
        <input type="text" id="password" placeholder="أدخل كلمة المرور" required>
    </div>

    <div class="form-group">
        <label for="birthdate">تاريخ الميلاد:</label>
        <input type="date" id="birthdate" required>
    </div>

    <div class="btn-container">
        <button class="btn-generate" onclick="generateSecureQR()">توليد الرمز</button>
        <button class="btn-save" onclick="saveDataLocally()">حفظ البيانات</button>
    </div>

    <div id="qrcode-container">
        <div id="qrcode"></div>
        <p class="alert-success">✓ تم إصلاح تشفير اللغة العربية! الكود جاهز للمسح الآن من أي هاتف.</p>
    </div>
</div>

<!-- مساحة إعلانات Adsterra السفلية -->
<div class="ad-space">
    <!-- كود إعلانات Adsterra السفلي -->
    <p>إعلان مدعوم</p>
</div>

<script>
    let qrInstance = null;

    function generateSecureQR() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const birthdate = document.getElementById('birthdate').value;

        if (!email || !password || !birthdate) {
            alert('الرجاء ملء الحقول أولاً لتوليد الكود!');
            return;
        }

        // تنسيق البيانات بشكل منظم
        let rawText = "البريد الإلكتروني: " + email + "\n" +
                      "كلمة المرور: " + password + "\n" +
                      "تاريخ الميلاد: " + birthdate;

        // 🚨 هنا الحل النهائي والجذري الذي يمنع خربطة الحروف العربية ويصلح المشكلة للأبد
        let formattedText = unescape(encodeURIComponent(rawText));

        document.getElementById('qrcode-container').style.display = 'flex';
        
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = '';
        
        qrInstance = new QRCode(qrDiv, {
            text: formattedText,
            width: 220,
            height: 220,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // ميزة حفظ البيانات محلياً التي طلبتها لحفظ التعب
    function saveDataLocally() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const birthdate = document.getElementById('birthdate').value;

        if (!email || !password || !birthdate) {
            alert('لا توجد بيانات كافية لحفظها!');
            return;
        }

        localStorage.setItem('saved_email', email);
        localStorage.setItem('saved_password', password);
        localStorage.setItem('saved_birthdate', birthdate);

        alert('✓ تم حفظ البيانات بنجاح داخل المفكرة المحلية للموقع!');
    }

    // استرجاع البيانات تلقائياً عند فتح الصفحة إذا كانت محفوظة سابقاً
    window.onload = function() {
        if(localStorage.getItem('saved_email')) {
            document.getElementById('email').value = localStorage.getItem('saved_email');
            document.getElementById('password').value = localStorage.getItem('saved_password');
            document.getElementById('birthdate').value = localStorage.getItem('saved_birthdate');
        }
    }
</script>

</body>
</html>
