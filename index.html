<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسخ احتياطي آمن QR</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; text-align: center; padding: 20px; }
        .box { max-width: 400px; background: white; margin: 40px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80px; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="box">
    <h2>🔐 نسخ احتياطي آمن (QR)</h2>
    <p>أدخل بياناتك السرية لتوليد كود QR وحفظه بجهازك.</p>
    <textarea id="txt" placeholder="اكتب الحسابات أو الأكواد هنا..."></textarea>
    <button onclick="makeQR()">توليد كود QR</button>
    <div id="qrcode"></div>
</div>
<script>
function makeQR() {
    var qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";
    var data = document.getElementById("txt").value;
    if(!data.trim()) { alert("اكتب شيئاً أولاً!"); return; }
    new QRCode(qrDiv, { text: data, width: 180, height: 180 });
}
</script>
</body>
</html>
